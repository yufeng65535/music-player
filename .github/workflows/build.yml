name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Linux ─────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-multimedia-dev libtag1-dev \
            cmake build-essential pkg-config \
            libfuse2 wget \
            libgl-dev libegl-dev libxcb-cursor0

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package AppImage
        run: |
          # Download linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Prepare AppDir
          mkdir -p release/AppDir/usr/{bin,share/icons/hicolor/256x256/apps}
          cp build/music release/AppDir/usr/bin/
          cp resources/app-icon.svg release/AppDir/usr/share/icons/hicolor/256x256/apps/musicplayer.svg

          # Desktop file
          cat > release/AppDir/musicplayer.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=MusicPlayer
          Comment=Local music library player
          Exec=AppRun
          Icon=musicplayer
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          EOF

          # AppRun
          cat > release/AppDir/AppRun <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/usr/plugins"
          exec "$HERE/usr/bin/music" "$@"
          EOF
          chmod +x release/AppDir/AppRun

          # Build AppImage
          cd release
          OUTPUT=MusicPlayer-x86_64.AppImage ../linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/musicplayer.desktop \
            --output appimage

      - name: Upload artifact (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-Linux
          path: release/MusicPlayer-x86_64.AppImage

  # ── Windows ───────────────────────────────────────────────────
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'

      - name: Install TagLib via vcpkg
        run: |
          vcpkg install taglib:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: |
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Deploy with windeployqt
        run: |
          mkdir release
          Copy-Item build\Release\music.exe release\
          windeployqt release\music.exe --release --no-compiler-runtime --no-system-d3d-compiler

      - name: Copy TagLib DLL
        run: |
          Copy-Item C:\vcpkg\installed\x64-windows\bin\tag.dll release\

      - name: Package
        run: |
          Compress-Archive -Path release\* -DestinationPath MusicPlayer-Windows.zip

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-Windows
          path: MusicPlayer-Windows.zip

  # ── macOS ─────────────────────────────────────────────────────
  # Note: GitHub only provides ARM macOS runners (Apple Silicon).
  # Intel Mac builds can be done locally via build-macos.sh.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt@6 taglib cmake

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0"

      - name: Build
        run: |
          cd build
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy
        run: |
          mkdir -p release/MusicPlayer.app/Contents/{MacOS,Resources,Frameworks}

          # Info.plist
          cat > release/MusicPlayer.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>music</string>
              <key>CFBundleIdentifier</key>
              <string>com.musicplayer.app</string>
              <key>CFBundleName</key>
              <string>MusicPlayer</string>
              <key>CFBundleVersion</key>
              <string>0.1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>0.1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
          </dict>
          </plist>
          PLIST

          cp build/music release/MusicPlayer.app/Contents/MacOS/music
          chmod +x release/MusicPlayer.app/Contents/MacOS/music
          cp resources/app-icon.svg release/MusicPlayer.app/Contents/Resources/

          $(brew --prefix qt@6)/bin/macdeployqt release/MusicPlayer.app -always-overwrite
          codesign --force --deep --sign - release/MusicPlayer.app

      - name: Create DMG
        run: |
          hdiutil create -volname MusicPlayer -srcfolder release -ov -format UDZO MusicPlayer-macOS.dmg

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-macOS
          path: MusicPlayer-macOS.dmg

  # ── Release (on tag) ──────────────────────────────────────────
  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
